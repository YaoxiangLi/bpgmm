url: https://yaoxiangli.github.io/bpgmm/

template:
  package: tidytemplate
  bootstrap: 5

navbar:
  structure:
    left: [home, get-started, reference, articles, news]
    right: [search, github]
  components:
    get-started:
      text: Get Started
      href: articles/getting-started.html

home:
  title: "bpgmm: Bayesian inference for parsimonious Gaussian mixture models"
  description: Bayesian inference for parsimonious Gaussian mixture models.
  sidebar:
    structure: [links, license, citation, authors_ordered, dev]
    components:
      authors_ordered:
        title: Authors
        text: |
          - Yaoxiang Li
          - Xiang Lu
          - Tanzy Love

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: "Developed by Yaoxiang Li, Xiang Lu, and Tanzy Love."

reference:
  - title: Model fitting
    contents:
      - pgmm_rjmcmc
      - pgmm_rjmcmc_chains
  - title: Summaries
    contents:
      - summarize_pgmm_rjmcmc
  - title: Constraint helpers
    contents:
      - model_to_constraint
      - constraint_to_model

articles:
  - title: Articles
    navbar: ~
    contents:
      - getting-started
      - data-preparation
      - model-and-sampler
      - examples
      - model-selection
      - variable-prioritization
      - posterior-diagnostics
